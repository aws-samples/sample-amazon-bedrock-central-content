<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <rect x="0" y="0" width="800" height="300" fill="#ffffff"/>
  
  <!-- User -->
  <rect x="30" y="115" width="80" height="70" rx="8" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
  <text x="70" y="155" font-family="sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle">User</text>
  
  <!-- Agent Circle -->
  <ellipse cx="250" cy="150" rx="80" ry="70" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="250" y="145" font-family="sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle">Agent</text>
  <text x="250" y="165" font-family="sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle">(LLM)</text>
  
  <!-- Tool Registry -->
  <rect x="380" y="30" width="120" height="50" rx="8" fill="#ffd8a8" stroke="#1e1e1e" stroke-width="2"/>
  <text x="440" y="60" font-family="sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle">Tool Registry</text>
  
  <!-- Tools -->
  <rect x="550" y="40" width="90" height="40" rx="6" fill="#74c0fc" stroke="#1e1e1e" stroke-width="2"/>
  <text x="595" y="65" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">API</text>
  
  <rect x="660" y="40" width="90" height="40" rx="6" fill="#74c0fc" stroke="#1e1e1e" stroke-width="2"/>
  <text x="705" y="65" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Database</text>
  
  <rect x="550" y="100" width="90" height="40" rx="6" fill="#74c0fc" stroke="#1e1e1e" stroke-width="2"/>
  <text x="595" y="125" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Calculator</text>
  
  <rect x="660" y="100" width="90" height="40" rx="6" fill="#74c0fc" stroke="#1e1e1e" stroke-width="2"/>
  <text x="705" y="125" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Service</text>
  
  <!-- Tool Executor -->
  <rect x="580" y="200" width="140" height="60" rx="8" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="650" y="225" font-family="sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle">Tool Executor</text>
  <text x="650" y="243" font-family="sans-serif" font-size="11" fill="#1e1e1e" text-anchor="middle">(Runtime)</text>
  
  <!-- Arrows: User to Agent -->
  <path d="M 110 140 L 160 140" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead4)"/>
  
  <!-- Arrows: Agent to User -->
  <path d="M 160 165 L 110 165" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead4)"/>
  
  <!-- Arrow: Agent to Tool Registry -->
  <path d="M 300 100 L 370 60" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead4)"/>
  
  <!-- Arrow: Tool Registry to Tools -->
  <path d="M 500 55 L 540 55" stroke="#1e1e1e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead4)"/>
  
  <!-- Arrow: Agent to Tool Executor -->
  <path d="M 320 180 L 570 220" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead4)"/>
  
  <!-- Arrow: Tool Executor to Agent (results) -->
  <path d="M 570 240 L 320 200" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowhead4)"/>
  
  <!-- Arrow: Tools to Executor -->
  <path d="M 650 150 L 650 190" stroke="#1e1e1e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead4)"/>
  
  <!-- Labels -->
  <text x="135" y="130" font-family="sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">query</text>
  <text x="135" y="180" font-family="sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">response</text>
  <text x="340" y="70" font-family="sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">search</text>
  <text x="420" y="200" font-family="sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">invoke</text>
  <text x="470" y="235" font-family="sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">results</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
</svg>
