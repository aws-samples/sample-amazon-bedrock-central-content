<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <rect x="0" y="0" width="800" height="300" fill="#ffffff"/>
  
  <!-- Input -->
  <rect x="30" y="115" width="80" height="60" rx="8" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
  <text x="70" y="150" font-family="sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle">Task</text>
  
  <!-- Agent Processing -->
  <ellipse cx="220" cy="145" rx="80" ry="50" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="220" y="140" font-family="sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle">Agent</text>
  <text x="220" y="158" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Processing</text>
  
  <!-- Decision Diamond -->
  <polygon points="400,145 450,100 500,145 450,190" fill="#ffd8a8" stroke="#1e1e1e" stroke-width="2"/>
  <text x="450" y="140" font-family="sans-serif" font-size="11" fill="#1e1e1e" text-anchor="middle">Needs</text>
  <text x="450" y="155" font-family="sans-serif" font-size="11" fill="#1e1e1e" text-anchor="middle">Review?</text>
  
  <!-- Human Review -->
  <rect x="390" y="230" width="120" height="55" rx="8" fill="#74c0fc" stroke="#1e1e1e" stroke-width="2"/>
  <text x="450" y="252" font-family="sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle">Human</text>
  <text x="450" y="270" font-family="sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle">Review</text>
  
  <!-- Continue Processing -->
  <ellipse cx="620" cy="145" rx="70" ry="45" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="620" y="140" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Continue</text>
  <text x="620" y="158" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Execution</text>
  
  <!-- Output -->
  <rect x="720" y="115" width="60" height="60" rx="8" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
  <text x="750" y="150" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Result</text>
  
  <!-- Arrows -->
  <path d="M 110 145 L 130 145" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead7)"/>
  <path d="M 300 145 L 390 145" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead7)"/>
  
  <!-- No path (direct) -->
  <path d="M 500 145 L 540 145" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead7)"/>
  <text x="520" y="135" font-family="sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">No</text>
  
  <!-- Yes path (to human) -->
  <path d="M 450 190 L 450 220" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead7)"/>
  <text x="465" y="210" font-family="sans-serif" font-size="10" fill="#1e1e1e" text-anchor="start">Yes</text>
  
  <!-- Human to Continue -->
  <path d="M 510 257 L 580 180" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead7)"/>
  <text x="560" y="230" font-family="sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">approved</text>
  
  <!-- Continue to Output -->
  <path d="M 690 145 L 710 145" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead7)"/>
  
  <!-- Feedback loop back to agent (dashed) -->
  <path d="M 390 270 C 200 300 150 250 180 200" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowhead7)"/>
  <text x="250" y="280" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">feedback</text>
  
  <!-- Labels -->
  <text x="340" y="135" font-family="sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">checkpoint</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead7" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
</svg>
