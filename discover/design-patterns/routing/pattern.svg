<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <rect x="0" y="0" width="800" height="320" fill="#ffffff"/>
  
  <!-- User Input -->
  <rect x="30" y="130" width="100" height="60" rx="8" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
  <text x="80" y="165" font-family="sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle">Request</text>
  
  <!-- Router -->
  <polygon points="280,160 350,100 420,160 350,220" fill="#ffd8a8" stroke="#1e1e1e" stroke-width="2"/>
  <text x="350" y="155" font-family="sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle">Router</text>
  <text x="350" y="173" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">(Classifier)</text>
  
  <!-- Specialist Handler 1 -->
  <ellipse cx="600" cy="60" rx="80" ry="40" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="600" y="55" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Domain A</text>
  <text x="600" y="72" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Handler</text>
  
  <!-- Specialist Handler 2 -->
  <ellipse cx="600" cy="160" rx="80" ry="40" fill="#74c0fc" stroke="#1e1e1e" stroke-width="2"/>
  <text x="600" y="155" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Domain B</text>
  <text x="600" y="172" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Handler</text>
  
  <!-- Specialist Handler 3 -->
  <ellipse cx="600" cy="260" rx="80" ry="40" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="600" y="255" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Domain C</text>
  <text x="600" y="272" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Handler</text>
  
  <!-- Output -->
  <rect x="720" y="130" width="60" height="60" rx="8" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
  <text x="750" y="165" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Result</text>
  
  <!-- Arrow: Input to Router -->
  <path d="M 130 160 L 270 160" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead3)"/>
  
  <!-- Arrows: Router to Handlers -->
  <path d="M 400 120 L 510 70" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead3)"/>
  <path d="M 420 160 L 510 160" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead3)"/>
  <path d="M 400 200 L 510 250" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead3)"/>
  
  <!-- Arrows: Handlers to Output -->
  <path d="M 680 70 L 720 130" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowhead3)"/>
  <path d="M 680 160 L 710 160" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowhead3)"/>
  <path d="M 680 250 L 720 190" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowhead3)"/>
  
  <!-- Labels -->
  <text x="200" y="150" font-family="sans-serif" font-size="11" fill="#1e1e1e" text-anchor="middle">classify</text>
  <text x="460" y="85" font-family="sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">route</text>
  <text x="460" y="150" font-family="sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">route</text>
  <text x="460" y="235" font-family="sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">route</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
</svg>
