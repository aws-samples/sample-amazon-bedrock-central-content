<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <rect x="0" y="0" width="800" height="350" fill="#ffffff"/>
  
  <!-- Coordinator Agent -->
  <ellipse cx="400" cy="80" rx="90" ry="50" fill="#ffd8a8" stroke="#1e1e1e" stroke-width="2"/>
  <text x="400" y="75" font-family="sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle">Coordinator</text>
  <text x="400" y="93" font-family="sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle">Agent</text>
  
  <!-- Specialist Agent 1 -->
  <ellipse cx="150" cy="250" rx="80" ry="50" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="150" y="245" font-family="sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle">Specialist</text>
  <text x="150" y="263" font-family="sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle">Agent A</text>
  
  <!-- Specialist Agent 2 -->
  <ellipse cx="400" cy="250" rx="80" ry="50" fill="#74c0fc" stroke="#1e1e1e" stroke-width="2"/>
  <text x="400" y="245" font-family="sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle">Specialist</text>
  <text x="400" y="263" font-family="sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle">Agent B</text>
  
  <!-- Specialist Agent 3 -->
  <ellipse cx="650" cy="250" rx="80" ry="50" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="650" y="245" font-family="sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle">Specialist</text>
  <text x="650" y="263" font-family="sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle">Agent C</text>
  
  <!-- User Input -->
  <rect x="30" y="55" width="100" height="50" rx="8" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
  <text x="80" y="85" font-family="sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle">User Task</text>
  
  <!-- Output -->
  <rect x="670" y="55" width="100" height="50" rx="8" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
  <text x="720" y="85" font-family="sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle">Result</text>
  
  <!-- Arrows: User to Coordinator -->
  <path d="M 130 80 L 300 80" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
  
  <!-- Arrows: Coordinator to Output -->
  <path d="M 500 80 L 660 80" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
  
  <!-- Arrows: Coordinator to Specialists -->
  <path d="M 340 120 L 180 200" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
  <path d="M 400 130 L 400 190" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
  <path d="M 460 120 L 620 200" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
  
  <!-- Arrows: Specialists back to Coordinator (dashed) -->
  <path d="M 200 210 L 350 130" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowhead2)"/>
  <path d="M 620 210 L 450 130" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowhead2)"/>
  
  <!-- Communication between specialists (dotted) -->
  <path d="M 230 250 L 320 250" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
  <path d="M 480 250 L 570 250" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
  
  <!-- Labels -->
  <text x="270" y="160" font-family="sans-serif" font-size="11" fill="#1e1e1e" text-anchor="middle">delegate</text>
  <text x="530" y="160" font-family="sans-serif" font-size="11" fill="#1e1e1e" text-anchor="middle">delegate</text>
  <text x="275" y="320" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">communicate</text>
  <text x="525" y="320" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">communicate</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
</svg>
