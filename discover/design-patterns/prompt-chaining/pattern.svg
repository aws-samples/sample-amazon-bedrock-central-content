<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <rect x="0" y="0" width="800" height="200" fill="#ffffff"/>
  
  <!-- Input -->
  <rect x="20" y="70" width="80" height="60" rx="8" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
  <text x="60" y="105" font-family="sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle">Input</text>
  
  <!-- Stage 1 -->
  <ellipse cx="190" cy="100" rx="60" ry="40" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="190" y="95" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Stage 1</text>
  <text x="190" y="112" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">(Extract)</text>
  
  <!-- Stage 2 -->
  <ellipse cx="340" cy="100" rx="60" ry="40" fill="#74c0fc" stroke="#1e1e1e" stroke-width="2"/>
  <text x="340" y="95" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Stage 2</text>
  <text x="340" y="112" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">(Transform)</text>
  
  <!-- Stage 3 -->
  <ellipse cx="490" cy="100" rx="60" ry="40" fill="#ffd8a8" stroke="#1e1e1e" stroke-width="2"/>
  <text x="490" y="95" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Stage 3</text>
  <text x="490" y="112" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">(Analyze)</text>
  
  <!-- Stage N -->
  <ellipse cx="640" cy="100" rx="60" ry="40" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="640" y="95" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Stage N</text>
  <text x="640" y="112" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">(Generate)</text>
  
  <!-- Output -->
  <rect x="720" y="70" width="60" height="60" rx="8" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
  <text x="750" y="105" font-family="sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle">Output</text>
  
  <!-- Arrows -->
  <path d="M 100 100 L 120 100" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead6)"/>
  <path d="M 250 100 L 270 100" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead6)"/>
  <path d="M 400 100 L 420 100" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead6)"/>
  <path d="M 550 100 L 570 100" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead6)"/>
  <path d="M 700 100 L 710 100" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrowhead6)"/>
  
  <!-- Dots between stages -->
  <text x="565" y="100" font-family="sans-serif" font-size="14" fill="#666" text-anchor="middle">...</text>
  
  <!-- Labels -->
  <text x="190" y="160" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">output₁ → input₂</text>
  <text x="340" y="160" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">output₂ → input₃</text>
  <text x="490" y="160" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">output₃ → input₄</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead6" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
</svg>
